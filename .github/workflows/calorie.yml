name: Calorie Heatmap Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *" # 北京时间 23:00

# 正式授予机器人推送文件的权限
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      # 映射 Secrets 里配置的密钥
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      # 可选：自动更新 Notion 页面嵌入链接
      NOTION_PAGE: ${{ secrets.NOTION_PAGE }}
      REPOSITORY: ${{ github.repository }}
      REF: ${{ github.ref }}
      GITHUB_USERNAME: ${{ github.repository_owner }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install github-heatmap

      - name: Generate Calorie Heatmap
        run: python update_calorie_heatmap.py

      - name: Update Notion Embed (optional)
        run: python update_notion_embed.py
        continue-on-error: true

      - name: Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add calorie_heatmap/
          git commit -m "Update calorie heatmap" || echo "No changes"
          git push
