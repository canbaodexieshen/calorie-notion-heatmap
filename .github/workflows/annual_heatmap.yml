name: Annual Calorie Heatmap Archive

on:
  workflow_dispatch:
    inputs:
      manual_year:
        description: '手动指定归档年份（例如 2025；留空则自动生成去年的热力图）'
        required: false
        default: ''
  schedule:
    # 每年 1 月 1 日北京时间 10:00（UTC 2:00）自动触发
    - cron: "0 2 1 1 *"

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install github-heatmap

      - name: Determine Target Year
        run: |
          if [ -n "${{ github.event.inputs.manual_year }}" ]; then
            echo "TARGET_YEAR=${{ github.event.inputs.manual_year }}" >> $GITHUB_ENV
          else
            LAST_YEAR=$(expr $(date +"%Y") - 1)
            echo "TARGET_YEAR=$LAST_YEAR" >> $GITHUB_ENV
          fi
          echo "归档目标年份: $TARGET_YEAR"

      - name: Generate & Archive Heatmap
        run: python archive_heatmap.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add old_heatmap/
          git commit -m "Archive calorie heatmap for ${{ env.TARGET_YEAR }}" || echo "nothing to commit"
          git push || echo "nothing to push"
